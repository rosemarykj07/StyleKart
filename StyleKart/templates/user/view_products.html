{% load static %}
<style>
  .card{
    width:250px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    margin: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0, 0.1);
    text-align: center;
  }
  .card-img{
    width:100%;
    height: 250px;
    object-fit: cover;
    border-radius: 8px;
  }
  .container{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn{
    color: white;
    background-color: black;
    border-radius: 8px;
  }
</style>

<h1 style="text-align: center;">{{title}} Products</h1>
<div class="container">
  {% for m in data %}
  <div class="card">
    <img src="{{m.image.url}}" class="card-img">
    <h2>{{m.pdt_name}}</h2>
    <p>{{m.description}}</p>
    <h3>${{m.price}}</h3>
    
    
    <form method="post" action="{% url 'add_to_cart' %}">
      {% csrf_token %}
      <input type="hidden" name="product_id" value="{{m.id}}">
      <button type="submit" class="btn">Add to Cart</button>
    </form>

  </div>
  {% endfor %}
</div>

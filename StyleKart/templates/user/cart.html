<h2 style="text-align:center;">Your Cart</h2>

<div class="container">
  {% for item in cart %}
  
  <div class="card">
    <img src="{{item.product.image.url}}" class="card-img">
    
    <h3>{{ item.product.pdt_name }}</h3>
    <p>Price: ₹{{ item.product.price }}</p>
    <p>Quantity: {{ item.quantity }}</p>
  </div>

  {% endfor %}
</div>

<form method="post" action="{% url 'remove_from_cart' %}">
  {% csrf_token %}
  <input type="hidden" name="cart_id" value="{{item.id}}">
  <button type="submit" class="btn">Remove</button>
</form>

<style>
  .card{
    width:250px;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 15px;
    margin: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0, 0.1);
    text-align: center;
  }
  .card-img{
    width:100%;
    height: 250px;
    object-fit: cover;
    border-radius: 8px;
  }
  .container{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn{
    color: white;
    background-color: black;
    border-radius: 8px;
  }
</style>
